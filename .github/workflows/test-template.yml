name: Test Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-template:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout template repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Copier
        run: pip install copier

      - name: Install Just
        run: |
          wget -qO- https://github.com/casey/just/releases/download/1.25.2/just-1.25.2-x86_64-unknown-linux-musl.tar.gz | tar xvz
          sudo mv just /usr/local/bin/

      - name: Generate test project
        run: |
          copier copy . /tmp/test-project \
            --data project_name="Test Project" \
            --data project_slug="test-project" \
            --data db_name="test_project" \
            --data python_version="3.12" \
            --data node_version="20" \
            --data author_name="Test Author" \
            --data author_email="test@example.com" \
            --vcs-ref HEAD \
            --overwrite \
            --UNSAFE

      - name: Install backend dependencies
        working-directory: /tmp/test-project
        run: |
          cd apps/backend
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: /tmp/test-project
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        working-directory: /tmp/test-project
        run: |
          cd apps/backend
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      - name: Lint frontend
        working-directory: /tmp/test-project
        run: |
          cd apps/frontend
          pnpm lint

      - name: Verify OpenAPI contracts
        working-directory: /tmp/test-project
        run: |
          pnpm --filter client generate
          git diff --exit-code packages/client/src/types.ts

      - name: Run database migrations
        working-directory: /tmp/test-project
        run: |
          cd apps/backend
          .venv/bin/alembic upgrade head

      - name: Run backend tests
        working-directory: /tmp/test-project
        run: |
          cd apps/backend
          .venv/bin/pytest -v --tb=short

      - name: Run frontend tests
        working-directory: /tmp/test-project
        run: |
          cd apps/frontend
          pnpm test

      - name: Build frontend
        working-directory: /tmp/test-project
        run: |
          cd apps/frontend
          pnpm build

      - name: Verify critical files exist
        working-directory: /tmp/test-project
        run: |
          files=(
            "apps/backend/app/main.py"
            "apps/backend/app/api/auth.py"
            "apps/backend/app/api/items.py"
            "apps/frontend/src/app/page.tsx"
            "packages/contracts/openapi.yaml"
            "justfile"
            "AGENTS.md"
            ".github/workflows/ci.yml"
          )
          
          missing=()
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              missing+=("$file")
            fi
          done
          
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing files:"
            printf '%s\n' "${missing[@]}"
            exit 1
          fi
          
          echo "✓ All critical files present"

      - name: Test generated CI workflow (syntax check)
        working-directory: /tmp/test-project
        run: |
          # Verify the generated CI file is valid YAML
          python -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml'))"
