_subdirectory: template
_templates_suffix: ""
_skip_if_exists:
  - .env

# Jinja env tweaks so generated files are clean for pre-commit:
# - trim_blocks: consume the newline after `%}` so wrapper lines (e.g.
#   `{% endraw %}` at EOF) don't leak a trailing blank line.
# - lstrip_blocks: strip leading whitespace before a `{% ... %}` on its own
#   line so we can indent wrapper tags to match surrounding code.
# Wrapped templates use `{% raw -%}` (note the `-`) because trim_blocks does
# not strip the newline after `{% raw %}` itself — raw is consumed by the
# lexer before trim_blocks applies.
_envops:
  trim_blocks: true
  lstrip_blocks: true

project_name:
  type: str
  help: "Project name (e.g. 'My SaaS App')"

project_slug:
  type: str
  help: "Project slug in kebab-case (e.g. 'my-saas-app')"
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

db_name:
  type: str
  help: "Database name"
  default: "{{ project_slug }}"

python_version:
  type: str
  help: "Python version"
  default: "3.12"

node_version:
  type: str
  help: "Node.js version"
  default: "20"

author_name:
  type: str
  help: "Author name"

author_email:
  type: str
  help: "Author email"

_tasks:
  - ["bash", "-c", "[ -f .env ] || cp .env.example .env"]
  - ["git", "init"]
  - ["git", "add", "."]
  - ["just", "install"]
  - ["uvx", "pre-commit", "install"]
